<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>

    <h2>Student Registration</h2>
    <form>
        <label>Name:</label>
        <input type="text">
        <label>Email:</label>
        <input type="email">
        <label>Gender:</label>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <label>Course:</label>
        <select>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
        </select>
        <input type="submit" value="Register">
    </form>
</body>
</html>
